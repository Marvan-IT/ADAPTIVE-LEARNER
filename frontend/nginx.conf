server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all unmatched paths serve index.html so React Router works
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend container.
    # The hostname "backend" resolves via Docker Compose's internal DNS.
    location /api/ {
        proxy_pass http://backend:8889;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Proxy extracted textbook images served by the backend
    location /images/ {
        proxy_pass http://backend:8889;
        proxy_set_header Host $host;
    }

    # Proxy any other static backend assets
    location /static/ {
        proxy_pass http://backend:8889;
        proxy_set_header Host $host;
    }
}
