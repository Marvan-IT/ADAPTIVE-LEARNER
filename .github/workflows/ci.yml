name: CI

# Run on every push to main/develop and on every PR targeting main.
# Jobs are independent and run in parallel.
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: lint with ruff ─────────────────────────────────────────────────
  backend-lint:
    name: Backend — Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint backend/src
        run: ruff check backend/src/

  # ── Frontend: install deps + build ─────────────────────────────────────────
  frontend-build:
    name: Frontend — Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          # Placeholder values — the build must succeed without real secrets.
          # Real values are injected at runtime via backend/.env and frontend/.env.
          VITE_API_BASE_URL: http://localhost:8889
          VITE_API_SECRET_KEY: ci-placeholder-key

  # ── Backend: run pytest suite ──────────────────────────────────────────────
  backend-test:
    name: Backend — Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run pytest
        run: pytest backend/tests/ -v
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db
          OPENAI_API_KEY: test-key-not-real
          API_SECRET_KEY: test-secret-key-for-ci
          JWT_SECRET_KEY: test-jwt-secret-for-ci
          ENVIRONMENT: test

  # ── Deploy to EC2 (main branch only) ───────────────────────────────────────
  deploy:
    name: Deploy — EC2
    runs-on: ubuntu-latest
    needs: [backend-lint, frontend-build, backend-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ${{ secrets.EC2_PROJECT_PATH }}
            git pull origin main
            # Regenerate nginx.conf from template using DOMAIN from .env
            if [ -f frontend/nginx.conf.template ] && grep -q '^DOMAIN=' .env 2>/dev/null; then
              export $(grep '^DOMAIN=' .env | head -1)
              envsubst '${DOMAIN}' < frontend/nginx.conf.template > frontend/nginx.conf
            fi
            docker compose up --build -d backend frontend
            docker compose exec -T backend python -m alembic upgrade head
