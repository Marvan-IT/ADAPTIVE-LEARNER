name: CI

# Run on every push to main/develop and on every PR targeting main.
# Jobs are independent and run in parallel.
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: lint with ruff ─────────────────────────────────────────────────
  backend-lint:
    name: Backend — Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint backend/src
        run: ruff check backend/src/

  # ── Frontend: install deps + build ─────────────────────────────────────────
  frontend-build:
    name: Frontend — Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          # Placeholder values — the build must succeed without real secrets.
          # Real values are injected at runtime via backend/.env and frontend/.env.
          VITE_API_BASE_URL: http://localhost:8889
          VITE_API_SECRET_KEY: ci-placeholder-key
